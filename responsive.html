<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Product Page</title>
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <header class="header">
    <div class="logo">LOGO</div>
    <input type="checkbox" id="menu-toggle" class="menu-toggle">
    <label for="menu-toggle" class="hamburger">☰</label>
    <nav class="nav">
      <a href="#">Trang chủ</a>
      <a href="#">Sản phẩm</a>
      <a href="#">Liên hệ</a>
    </nav>
  </header>

  <div class="container">
    <aside class="sidebar">
      <h3>Bộ lọc</h3>
      <select>
        <option>Giá: Từ thấp đến cao</option>
        <option>Giá: Từ cao xuống thấp</option>
      </select>
    </aside>

    <main class="product-grid">
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 1"><h3>Sản phẩm 1</h3><p>100.000đ</p></div>
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 2"><h3>Sản phẩm 2</h3><p>200.000đ</p></div>
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 3"><h3>Sản phẩm 3</h3><p>300.000đ</p></div>
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 4"><h3>Sản phẩm 4</h3><p>400.000đ</p></div>
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 5"><h3>Sản phẩm 5</h3><p>500.000đ</p></div>
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 6"><h3>Sản phẩm 6</h3><p>600.000đ</p></div>
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 7"><h3>Sản phẩm 7</h3><p>700.000đ</p></div>
      <div class="card"><img src="https://placehold.co/300x300" alt="Sản phẩm 8"><h3>Sản phẩm 8</h3><p>800.000đ</p></div>
    </main>

    <aside class="ads-bar">
      <h3>Quảng cáo</h3>
      <div class="ad-banner">Banner</div>
    </aside>
  </div>

  <footer class="footer">
    <p>© 2026 Responsive Product Page</p>
  </footer>
</body>
</html>
